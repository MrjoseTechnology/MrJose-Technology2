<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - MrJose Technology</title>
    <link rel="icon" type="image/jpg" href="https://raw.githubusercontent.com/MrjoseTechnology/MrJose-Technology2/main/Logo%20empresa%20pagina.jpg">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/MrjoseTechnology/MrJose-Technology2/main/Logo%20empresa%20pagina.jpg">
    <style>
        :root {
            --cuadro-rosado: #fff0f5;
            --boton-rosado: #ffb6c1;
            --texto-negro: #1a1a1a;
        }
        body {
            background-image: url('https://raw.githubusercontent.com/MrjoseTechnology/MrJose-Technology2/main/Fondo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            background-color: var(--cuadro-rosado);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 350px;
            text-align: center;
        }
        .logo-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #87ceeb;
            margin-bottom: 10px;
        }
        h2 {
            color: var(--texto-negro);
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }
        .field {
            text-align: left;
            margin-bottom: 15px;
            position: relative;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 35px;
            cursor: pointer;
            font-size: 1.2rem;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--boton-rosado);
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-wa {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }
        .status-msg {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
    <img src="https://raw.githubusercontent.com/MrjoseTechnology/MrJose-Technology2/main/Logo%20empresa%20pagina.jpg" class="logo-img">
    
    <div id="seccion-login">
        <h2>Iniciar Sesión</h2>
        <form id="loginForm">
            <div class="field">
                <label>Usuario</label>
                <input type="text" id="logUser" required>
            </div>
            <div class="field">
                <label>Contraseña</label>
                <input type="password" id="logPass" required>
            </div>
            <button type="submit" id="btnEntrar">Entrar</button>
        </form>
        <p style="margin-top: 15px; font-size: 13px;">
            ¿No tienes cuenta? <a href="#" onclick="mostrarRegistro()" style="color: #ff69b4; font-weight: bold;">Regístrate aquí</a>
        </p>
    </div>

    <div id="seccion-registro" style="display: none;">
        <h2>Crear Cuenta</h2>
        <form id="regForm">
            <div class="field">
                <label>Nuevo Usuario</label>
                <input type="text" id="regUser" required>
            </div>
            <div class="field">
                <label>Contraseña</label>
                <input type="password" id="regPass" required>
            </div>
            <button type="submit" id="btnCrear" style="background-color: #87ceeb;">Registrarse</button>
        </form>
        <p style="margin-top: 15px; font-size: 13px;">
            ¿Ya tienes cuenta? <a href="#" onclick="mostrarLogin()" style="color: #ff69b4; font-weight: bold;">Inicia sesión</a>
        </p>
    </div>

    <div id="mensaje" class="status-msg"></div>
</div>
    <a href="https://wa.me/573113330182" class="btn-wa" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" style="width:100%">
    </a>

    <script>
        // USA TU URL DE GOOGLE AQUÍ
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxSeIvf5_POl72_OZvl2Z-k64zIrLOAkpRbP75ctRXB-PgVTyC_-yt_2CcHnJB2F26I8g/exec';
        
        const form = document.getElementById('techForm');
        const pass = document.getElementById('passInput');
        const user = document.getElementById('userInput');
        const msg = document.getElementById('mensaje');
        const btn = document.getElementById('btnRegistrar');

        // Función para ver/ocultar contraseña
        document.getElementById('btnOjo').onclick = function() {
            pass.type = (pass.type === 'password') ? 'text' : 'password';
        };

        // 1. LÓGICA PARA INICIAR SESIÓN (Botón Entrar)
document.getElementById('loginForm').onsubmit = function(e) {
    e.preventDefault();
    const user = document.getElementById('logUser').value;
    const pass = document.getElementById('logPass').value;
    const btn = document.getElementById('btnEntrar');
    const msg = document.getElementById('mensaje');

    btn.disabled = true;
    btn.innerText = "Verificando...";

    // Consultamos al Excel si el usuario existe (GET)
    fetch(scriptURL + "?Usuario=" + encodeURIComponent(user) + "&Password=" + encodeURIComponent(pass))
    .then(response => response.json())
    .then(data => {
        if (data.result === "success") {
            msg.style.display = "block";
            msg.style.color = "blue";
            msg.innerText = "¡Hola " + user + "! Entrando...";
            setTimeout(() => { window.location.href = 'menu.html'; }, 1500);
        } else {
            alert("Usuario o contraseña incorrectos");
            btn.disabled = false;
            btn.innerText = "Entrar";
        }
    })
    .catch(error => {
        console.error("Error:", error);
        btn.disabled = false;
        btn.innerText = "Entrar";
    });
};

// 2. LÓGICA PARA REGISTRARSE (Botón Registrarse)
document.getElementById('regForm').onsubmit = function(e) {
    e.preventDefault();
    const user = document.getElementById('regUser').value;
    const pass = document.getElementById('regPass').value;
    const btn = document.getElementById('btnCrear');

    btn.disabled = true;
    btn.innerText = "Guardando...";

    // Enviamos los datos para crear nueva fila (POST)
    let formData = new FormData();
    formData.append("Usuario", user);
    formData.append("Password", pass);

    fetch(scriptURL, { method: 'POST', body: formData })
    .then(response => response.json())
    .then(data => {
        alert("✨ ¡Cuenta creada con éxito! Ahora ya puedes iniciar sesión.");
        mostrarLogin(); // Esta función oculta el registro y muestra el login
        btn.disabled = false;
        btn.innerText = "Registrarse";
    })
    .catch(error => {
        alert("Error al registrar: " + error);
        btn.disabled = false;
        btn.innerText = "Registrarse";
    });
};

// Funciones para cambiar de vista (IMPORTANTE)
function mostrarRegistro() {
    document.getElementById('seccion-login').style.display = 'none';
    document.getElementById('seccion-registro').style.display = 'block';
}

function mostrarLogin() {
    document.getElementById('seccion-registro').style.display = 'none';
    document.getElementById('seccion-login').style.display = 'block';
}
    </script>
</body>
</html>
