<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - MrJose Technology</title>
    <style>
        :root {
            --cuadro-rosado: #fff0f5; 
            --boton-rosado: #ffb6c1; 
            --texto-negro: #1a1a1a;
            --whatsapp-color: #25d366;
        }

        body {
            background-image: url('https://raw.githubusercontent.com/MrjoseTechnology/MrJose-Technology2/main/Fondo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            background-color: var(--cuadro-rosado);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        .logo-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #87ceeb;
            margin-bottom: 10px;
        }

        h2 {
            color: var(--texto-negro);
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .field {
            text-align: left;
            margin-bottom: 15px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--texto-negro);
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 35px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--boton-rosado);
            color: var(--texto-negro);
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            margin-top: 10px;
        }

        button:hover {
            filter: brightness(0.9);
        }

        .footer-text {
            font-size: 10px;
            color: #666;
            margin-top: 20px;
        }

        /* BOTÓN WHATSAPP FLOTANTE */
        .btn-whatsapp {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 20px;
            right: 20px;
            background-color: var(--whatsapp-color);
            color: #FFF;
            border-radius: 50px;
            text-align: center;
            font-size: 30px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: transform 0.3s;
        }

        .btn-whatsapp:hover {
            transform: scale(1.1);
        }

        .status-msg {
            margin-top: 10px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="https://raw.githubusercontent.com/MrjoseTechnology/MrJose-Technology2/main/Logo%20empresa%20pagina.jpg" alt="Logo" class="logo-img">
    
    <h2>Registro de usuario</h2>
    
    <form id="techForm">
        <div class="field">
            <label>Usuario</label>
            <input type="text" name="Usuario" placeholder="Escribe tu usuario" required>
        </div>

        <div class="field">
            <label>Contraseña</label>
            <input type="password" name="Password" id="pass" placeholder="Escribe tu contraseña" required>
            <span class="toggle-password" id="btnOjo">👁️</span>
        </div>

        <button type="submit" id="btnRegistrar">Registrar</button>
        
        <div id="mensaje" class="status-msg"></div>
        
        <div class="footer-text">bienvenido a mi pagina</div>
    </form>
</div>

<a href="https://wa.me/573113330182?text=Hola%20Jose,%20necesito%20ayuda%20con%20el%20registro" class="btn-whatsapp" target="_blank">
    <svg width="35" height="35" fill="currentColor" viewBox="0 0 16 16">
