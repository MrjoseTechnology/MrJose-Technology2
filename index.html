<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - MrJose Technology</title>
    <style>
        :root {
            --fondo-morado: #dcd0ff; 
            --cuadro-rosado: #fff0f5; 
            --azul-tecnologico: #87ceeb; 
            --texto-negro: #1a1a1a;
        }

        body {
            /* Imagen de fondo configurada */
            background-image: url('https://raw.githubusercontent.com/MrjoseTechnology/MrJose-Technology2/main/Fondo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Efecto de brillo sutil al cuadro para que resalte del fondo */
        .card {
            background-color: var(--cuadro-rosado);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 350px;
            border: 1px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(5px); /* Un ligero desenfoque para estilo moderno */
        }

        .logo-container {
            text-align: center;
            margin-bottom: 15px;
        }

        .logo-img {
            width: 100px; /* Tamaño del logo */
            height: 100px;
            border-radius: 50%; /* Lo hace circular */
            object-fit: cover;
            border: 3px solid var(--azul-tecnologico);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: var(--texto-negro);
            margin-bottom: 20px;
            font-size: 1.4rem;
            text-transform: uppercase;
        }

        .field {
            margin-bottom: 15px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--texto-negro);
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 35px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--azul-tecnologico);
            color: var(--texto-negro);
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            filter: brightness(1.1);
            transform: scale(1.02);
        }

        .status-msg {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-container">
        <img src="https://raw.githubusercontent.com/MrjoseTechnology/MrJose-Technology2/main/Logo%20empresa%20pagina.jpg" alt="Logo Tech" class="logo-img">
    </div>
    
    <h2>MrJose Technology</h2>
    
    <form id="techForm">
