<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - MrJose Technology</title>
    <style>
        :root {
            --cuadro-rosado: #fff0f5; 
            --boton-rosado: #ffb6c1; /* Rosado para el botón */
            --texto-negro: #1a1a1a;
        }

        body {
            background-image: url('https://raw.githubusercontent.com/MrjoseTechnology/MrJose-Technology2/main/Fondo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            background-color: var(--cuadro-rosado);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        .logo-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #87ceeb;
            margin-bottom: 10px;
        }

        h2 {
            color: var(--texto-negro);
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .field {
            text-align: left;
            margin-bottom: 15px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--texto-negro);
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 35px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--boton-rosado);
            color: var(--texto-negro);
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            margin-top: 10px;
        }

        button:hover {
            filter: brightness(0.9);
        }

        .footer-text {
            font-size: 10px;
            color: #666;
            margin-top: 20px;
        }

        .status-msg {
            margin-top: 10px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="https://raw.githubusercontent.com/MrjoseTechnology/MrJose-Technology2/main/Logo%20empresa%20pagina.jpg" alt="Logo" class="logo-img">
    
    <h2>Registro de usuario</h2>
    
    <form id="techForm">
        <div class="field">
            <label>Usuario</label>
            <input type="text" name="Usuario" placeholder="Escribe tu usuario" required>
        </div>

        <div class="field">
            <label>Contraseña</label>
            <input type="password" name="Password" id="pass" placeholder="Escribe tu contraseña" required>
            <span class="toggle-password" id="btnOjo">👁️</span>
        </div>

        <button type="submit" id="btnRegistrar">Registrar</button>
        
        <div id="mensaje" class="status-msg"></div>
        
        <div class="footer-text">bienvenido a mi pagina</div>
    </form>
</div>

<script>
    // RECUERDA: Pega aquí tu URL de Google Apps Script para que se guarden los datos
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxH87FDVAgPbIQ6uYfIlUd6SRIGiHwtYd7IXgZvWzbmihH1PF-U9HrXKM_zTlNXiU9xYA/exec'; 
    
    const form = document.getElementById('techForm');
    const passInput = document.getElementById('pass');
    const btnOjo = document.getElementById('btnOjo');
    const msg = document.getElementById('mensaje');

    // Lógica para ver/ocultar contraseña
    btnOjo.addEventListener('click', () => {
        const type = passInput.type === 'password' ? 'text' : 'password';
        passInput.type = type;
        btnOjo.textContent = type === 'password' ? '👁️' : '🙈';
    });

    // Envío de datos a Google Sheets
    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('btnRegistrar');
        btn.disabled = true;
        btn.innerText = "Registrando...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
          .then(response => {
              msg.style.display = "block";
              msg.style.color = "green";
              msg.innerText = "¡Datos guardados con éxito!";
              form.reset();
              btn.disabled = false;
              btn.innerText = "Registrar";
          })
          .catch(error => {
              msg.style.display = "block";
              msg.style.color = "red";
              msg.innerText = "Error al guardar los datos.";
              btn.disabled = false;
              btn.innerText = "Registrar";
          });
    });
</script>

</body>
</html>
