<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - MrJose Technology</title>
    <link rel="icon" type="image/jpg" href="https://raw.githubusercontent.com/MrjoseTechnology/MrJose-Technology2/main/Logo%20empresa%20pagina.jpg">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/MrjoseTechnology/MrJose-Technology2/main/Logo%20empresa%20pagina.jpg">
    <style>
        :root {
            --cuadro-rosado: #fff0f5;
            --boton-rosado: #ffb6c1;
            --texto-negro: #1a1a1a;
        }
        body {
            background-image: url('https://raw.githubusercontent.com/MrjoseTechnology/MrJose-Technology2/main/Fondo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            background-color: var(--cuadro-rosado);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 350px;
            text-align: center;
        }
        .logo-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #87ceeb;
            margin-bottom: 10px;
        }
        h2 {
            color: var(--texto-negro);
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }
        .field {
            text-align: left;
            margin-bottom: 15px;
            position: relative;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 35px;
            cursor: pointer;
            font-size: 1.2rem;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--boton-rosado);
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-wa {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }
        .status-msg {
            margin-top: 10px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://raw.githubusercontent.com/MrjoseTechnology/MrJose-Technology2/main/Logo%20empresa%20pagina.jpg" class="logo-img">
        <h2>Registro de usuario</h2>
        <form id="techForm">
            <div class="field">
                <label>Usuario</label>
                <input type="text" id="userInput" name="Usuario" required>
            </div>
            <div class="field">
                <label>Contraseña</label>
                <input type="password" name="Password" id="passInput" required>
                <span class="toggle-password" id="btnOjo">👁️</span>
            </div>
            <button type="submit" id="btnRegistrar">Registrar</button>
            <div id="mensaje" class="status-msg"></div>
            <div style="font-size: 10px; margin-top: 20px; color: #666;">bienvenido a mi pagina</div>
        </form>
    </div>
    <a href="https://wa.me/573113330182" class="btn-wa" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" style="width:100%">
    </a>
    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxH87FDVAgPbIQ6uYfIlUd6SRIGiHwtYd7IXgZvWzbmihH1PF-U9HrXKM_zTlNXiU9xYA/exec';
        const form = document.getElementById('techForm');
        const pass = document.getElementById('passInput');
        const user = document.getElementById('userInput');
        const msg = document.getElementById('mensaje');

        document.getElementById('btnOjo').onclick = function() {
            if (pass.type === 'password') {
                pass.type = 'text';
            } else {
                pass.type = 'password';
            }
        };

        form.onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnRegistrar');
            btn.disabled = true;
            btn.innerText = "Procesando...";

            fetch(scriptURL, { method: 'POST', body: new FormData(form) })
            .then(function() {
                // (MrJose) Y (DayanaJRM)
                const esMrJose = (user.value === 'MrJose' && pass.value === '14062020DAYANA');
                const esDayana = (user.value === 'DayanaJRM' && pass.value === 'Potomac2026');

                if (esMrJose || esDayana) {
                    msg.style.display = "block";
                    msg.style.color = "blue";
                    msg.innerText = "¡Hola " + user.value + "! Entrando...";
                    setTimeout(function() {
                        window.location.href = 'menu.html';
                    }, 1500);
                } else {
                    msg.style.display = "block";
                    msg.style.color = "green";
                    msg.innerText = "¡Datos guardados con éxito!";
                    form.reset();
                    btn.disabled = false;
                    btn.innerText = "Registrar";
                }
            })
            .catch(function() {
                msg.style.display = "block";
                msg.style.color = "red";
                msg.innerText = "Error de conexión";
                btn.disabled = false;
                btn.innerText = "Registrar";
            });
        };
    </script>
</body>
</html>
