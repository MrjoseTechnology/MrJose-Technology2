<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - MrJose Technology</title>
    <style>
        :root {
            --cuadro-rosado: rgba(255, 240, 245, 0.85);
            --boton-rosado: #ffb6c1;
            --texto-negro: #1a1a1a;
        }
        body {
            background-image: url('https://raw.githubusercontent.com/MrjoseTechnology/MrJose-Technology2/main/Fondo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        .menu-card {
            background-color: var(--cuadro-rosado);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 90%;
            max-width: 350px;
            text-align: center;
            backdrop-filter: blur(8px);
        }
        .logo-menu {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #87ceeb;
            margin-bottom: 20px;
        }
        h1 {
            color: var(--texto-negro);
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        .btn-salir {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--boton-rosado);
            color: var(--texto-negro);
            text-decoration: none;
            font-weight: bold;
            border-radius: 12px;
            font-size: 16px;
            text-transform: uppercase;
            transition: 0.3s;
            box-sizing: border-box;
        }
        .btn-salir:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="menu-card">
        <img src="https://raw.githubusercontent.com/MrjoseTechnology/MrJose-Technology2/main/Logo%20empresa%20pagina.jpg" class="logo-menu">
        <h1>Bienvenido MrJose</h1>
        <a href="index.html" class="btn-salir">Cerrar Sesión</a>
        <p style="font-size: 10px; margin-top: 30px; color: #555;">MrJose Technology © 2024</p>
    </div>
</body>
</html>
